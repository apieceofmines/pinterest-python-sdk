name: Publish Docker Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: apieceofmines

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != null

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./java-spring-sample/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != null }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-api:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./apieceofmines-web
          file: ./apieceofmines-web/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != null }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-web:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        if: secrets.DOCKER_USERNAME != null && secrets.DOCKERHUB_TOKEN != null
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKER_USERNAME }}/apieceofmines-api
          short-description: 'Family Online Kids Product - Backend API'
          readme-filepath: ./java-spring-sample/README.md
