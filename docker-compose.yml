version: '3.8'

services:
  # Backend API Server
  api:
    build:
      context: .
      dockerfile: ./java-spring-sample/Dockerfile
    container_name: apieceofmines-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - apieceofmines-network

  # Frontend Landing Page
  web:
    build:
      context: ./apieceofmines-web
      dockerfile: ./Dockerfile
    container_name: apieceofmines-web
    ports:
      - "80:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - apieceofmines-network

networks:
  apieceofmines-network:
    driver: bridge
